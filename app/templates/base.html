<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Renarin">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#13171f">
    <link rel="manifest" href="{{ url_for('static', path='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='icon.svg') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='icon.svg') }}">
    <title>{% block title %}Renarin{% endblock %} · PKA Dashboard</title>
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      );
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="{{ url_for('static', path='htmx.min.js') }}" defer></script>
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li><strong>Renarin</strong></li>
        </ul>
        <ul class="nav-links">
          <li><a href="/" {% if active == 'today' %}class="active"{% endif %}>Today</a></li>
          <li><a href="/needs-attention" {% if active == 'needs-attention' %}class="active"{% endif %}>Needs Attention</a></li>
          <li><a href="/drafts" {% if active == 'drafts' %}class="active"{% endif %}>Drafts</a></li>
          <li><a href="/archive" {% if active == 'archive' %}class="active"{% endif %}>Archive</a></li>
        </ul>
      </nav>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <footer class="container">
      <small>Renarin · PKA view</small>
    </footer>
    <div id="toast-container" aria-live="polite"></div>

    <div id="idle-lock-shield" hidden>
      <div class="idle-lock-inner">
        <p>🔒 Paused</p>
        <button type="button" id="idle-lock-resume" class="primary">Tap to resume</button>
      </div>
    </div>

    <script>
      // Read the CSRF cookie set by the middleware and attach it as a header
      // to every mutating request. htmx + window.fetch both covered.
      (function () {
        var CSRF_COOKIE = {{ csrf_cookie_name|tojson }};
        var CSRF_HEADER = {{ csrf_header_name|tojson }};

        function readCookie(name) {
          var pairs = (document.cookie || '').split(';');
          for (var i = 0; i < pairs.length; i++) {
            var eq = pairs[i].indexOf('=');
            if (eq < 0) continue;
            var k = pairs[i].slice(0, eq).trim();
            if (k === name) return decodeURIComponent(pairs[i].slice(eq + 1));
          }
          return '';
        }

        window.__renarinCsrfToken = function () { return readCookie(CSRF_COOKIE); };
        window.__renarinCsrfHeader = CSRF_HEADER;

        document.body.addEventListener('htmx:configRequest', function (e) {
          var method = (e.detail.verb || '').toUpperCase();
          if (method === 'POST' || method === 'PUT' || method === 'PATCH' || method === 'DELETE') {
            var token = readCookie(CSRF_COOKIE);
            if (token) e.detail.headers[CSRF_HEADER] = token;
          }
        });

        // Wrap window.fetch for the non-htmx code paths (flushDirtyTextareas, todo/comment save).
        var _origFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          init = init || {};
          var method = ((init && init.method) || (typeof input !== 'string' && input.method) || 'GET').toUpperCase();
          if (method === 'POST' || method === 'PUT' || method === 'PATCH' || method === 'DELETE') {
            var token = readCookie(CSRF_COOKIE);
            if (token) {
              var headers = new Headers(init.headers || (typeof input !== 'string' ? input.headers : undefined));
              if (!headers.has(CSRF_HEADER)) headers.set(CSRF_HEADER, token);
              init.headers = headers;
            }
          }
          return _origFetch(input, init);
        };
      })();
    </script>

    <script src="{{ url_for('static', path='todo.js') }}" defer></script>
    <script>
      document.body.addEventListener('todosaved', () => window.flashToast && window.flashToast('Saved'));
      document.body.addEventListener('commentssaved', () => window.flashToast && window.flashToast('Saved'));
      document.body.addEventListener('reviewsaved', () => window.flashToast && window.flashToast('Marked reviewed'));
      document.body.addEventListener('responsesaved', () => window.flashToast && window.flashToast('Saved'));
      document.body.addEventListener('allreviewed', () => window.flashToast && window.flashToast('✓ All responses complete — note marked reviewed', 'success', 3000));
    </script>

    <script>
      // Register the service worker for offline / install-as-PWA support.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('{{ url_for("static", path="sw.js") }}', { scope: '/' }).catch(function () {});
        });
      }
    </script>

    <script>
      // Idle-lock shield: overlay after N seconds of no input. Screen-privacy
      // only, NOT authentication. Set RENARIN_IDLE_LOCK_SECONDS=0 to disable.
      (function () {
        var timeoutSec = {{ idle_lock_seconds|int }};
        if (!timeoutSec || timeoutSec <= 0) return;
        var shield = document.getElementById('idle-lock-shield');
        var resumeBtn = document.getElementById('idle-lock-resume');
        if (!shield || !resumeBtn) return;
        var timer = null;

        function show() { shield.hidden = false; }
        function hide() { shield.hidden = true; reset(); }
        function reset() {
          if (timer) clearTimeout(timer);
          timer = setTimeout(show, timeoutSec * 1000);
        }

        ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(function (evt) {
          window.addEventListener(evt, function () {
            if (shield.hidden) reset();
          }, { passive: true });
        });
        resumeBtn.addEventListener('click', hide);
        shield.addEventListener('click', function (e) { if (e.target === shield) hide(); });

        reset();
      })();
    </script>

    <script>
    (function () {
      if (new URLSearchParams(window.location.search).get('debug') !== '1') return;
      var panel = document.createElement('div');
      panel.id = 'debug-log';
      panel.style.cssText = [
        'position:fixed', 'bottom:0', 'left:0', 'width:420px',
        'max-height:40vh', 'overflow-y:auto',
        'background:rgba(0,0,0,0.88)', 'color:#0f0',
        'font-family:monospace', 'font-size:11px',
        'padding:8px', 'z-index:9999',
        'border-top:1px solid #0f0'
      ].join(';');
      document.body.appendChild(panel);

      function logEntry(msg) {
        var line = document.createElement('div');
        line.textContent = new Date().toISOString().slice(11, 23) + ' ' + msg;
        panel.appendChild(line);
        if (panel.children.length > 200) panel.removeChild(panel.firstChild);
        panel.scrollTop = panel.scrollHeight;
      }

      document.addEventListener('htmx:beforeRequest', function (e) {
        var el = e.detail && e.detail.elt;
        if (!el) return;
        var url = el.getAttribute('hx-patch') || el.getAttribute('hx-post') || el.getAttribute('hx-put') || '?';
        var verb = el.getAttribute('hx-patch') ? 'PATCH' : (el.getAttribute('hx-post') ? 'POST' : 'PUT');
        var mtime = el.dataset && el.dataset.mtime;
        logEntry(verb + ' ' + url + (mtime ? ' mt=' + parseFloat(mtime).toFixed(3) : ''));
      });

      document.addEventListener('htmx:afterRequest', function (e) {
        var xhr = e.detail && e.detail.xhr;
        var status = xhr && xhr.status;
        logEntry('  → ' + (status || '?') + (e.detail && e.detail.successful ? ' OK' : ' FAIL'));
      });
    })();
    </script>
  </body>
</html>
